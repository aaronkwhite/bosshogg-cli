# -----------------------------------------------------------------------------
# Shared patterns (used by multiple resources)
# -----------------------------------------------------------------------------
shared_query_params:
  list:
    - limit        # default 100, max varies
    - offset
    - cursor
    - search
    - tags
    - format
  common_write_fields:
    - name
    - description
    - tags
    - deleted      # for soft delete

shared_file_inputs:
  - --filters-file       # flag/cohort/insight filter trees
  - --payload-file       # flag JSON payloads
  - --description-file   # markdown descriptions
  - --query-file         # HogQL source
